[pytest]
# ---------------------------------------------------------------------------
# pytest configuration for the Project Manager PyQt5 application
# ---------------------------------------------------------------------------

# Discover tests only inside the tests/ directory
testpaths = tests

# Show short tracebacks and extra summary for failures/errors
addopts = -v --tb=short -ra

# Treat any test that emits a Qt warning as a warning (not an error) so the
# suite keeps running while still making issues visible.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
